  <style>
    /* --- NEW SECTIONS STYLING --- */
    .reviews-section, .about-me-section {
      padding: 20px 15px;
      margin: 0 auto;
      max-width: 600px; 
      overflow: hidden; /* This prevents the carousel from breaking the screen width */
    }
  
    .section-title {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #333;
    }
  
    .reviews-carousel {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }
  
    .reviews-track {
      display: flex;
      transition: transform 0.5s ease-in-out;
      width: 100%;
    }
  
    .review-slide {
      min-width: 100%;
      object-fit: cover;
      border-radius: 12px;
      display: block;
    }
  
    .reviews-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
  
    .dot {
      width: 8px;
      height: 8px;
      background-color: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      cursor: pointer;
    }
  
    .dot.active {
      background-color: #ffffff;
      box-shadow: 0 0 3px rgba(0,0,0,0.4);
    }
  
    .about-me-img {
      width: 100%;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      display: block;
    }
  </style>

<script>
  // Testimonials Carousel Auto-Slide Logic
  document.addEventListener('DOMContentLoaded', () => {
    const track = document.getElementById('reviewsTrack');
    const dots = document.querySelectorAll('#reviewsDots .dot');
    
    if (!track || dots.length === 0) {
      console.log("Carousel elements not found!");
      return;
    }

    let currentIndex = 0;
    const totalSlides = dots.length;

    function updateReviewCarousel() {
      track.style.transform = `translateX(-${currentIndex * 100}%)`;
      dots.forEach(dot => dot.classList.remove('active'));
      dots[currentIndex].classList.add('active');
    }

    function nextReviewSlide() {
      currentIndex = (currentIndex + 1) % totalSlides;
      updateReviewCarousel();
    }

    let reviewInterval = setInterval(nextReviewSlide, 3000);

    dots.forEach((dot, index) => {
      dot.addEventListener('click', () => {
        currentIndex = index;
        updateReviewCarousel();
        clearInterval(reviewInterval);
        reviewInterval = setInterval(nextReviewSlide, 3000);
      });
    });
  });
</script>
